# COTURN configuration for Rapidly P2P file sharing
# See: https://github.com/coturn/coturn/wiki/turnserver

# Listening ports
listening-port=3478
tls-listening-port=5349
# TLS certificate for TURNS (port 5349).
# Required for production — without these, turns: URLs will fail.
# cert=/etc/coturn/certs/turn.pem
# pkey=/etc/coturn/certs/turn.key

# Realm — set to your domain
realm=rapidly.tech

# Use ephemeral credentials (shared secret with backend)
use-auth-secret
# Use SHA-256 for HMAC credential validation (default is SHA-1).
# Backend must generate credentials with HMAC-SHA256 to match.
sha256
# Secret is injected via docker-compose command-line override.
# COTURN does not support environment variable substitution in config files,
# so we pass --static-auth-secret as a CLI argument instead.
# static-auth-secret is set via CLI

# UDP relay port range
min-port=49152
max-port=65535

# Security: prevent relay to private/reserved IPs (IPv4)
denied-peer-ip=0.0.0.0-0.255.255.255
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=100.64.0.0-100.127.255.255
denied-peer-ip=127.0.0.0-127.255.255.255
denied-peer-ip=169.254.0.0-169.254.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.0.0.0-192.0.0.255
denied-peer-ip=192.88.99.0-192.88.99.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=198.18.0.0-198.19.255.255
denied-peer-ip=198.51.100.0-198.51.100.255
denied-peer-ip=203.0.113.0-203.0.113.255
denied-peer-ip=224.0.0.0-239.255.255.255
denied-peer-ip=240.0.0.0-255.255.255.255
# Security: prevent relay to private/reserved IPs (IPv6)
denied-peer-ip=::1
denied-peer-ip=::ffff:0.0.0.0-::ffff:0.255.255.255
denied-peer-ip=::ffff:10.0.0.0-::ffff:10.255.255.255
denied-peer-ip=::ffff:100.64.0.0-::ffff:100.127.255.255
denied-peer-ip=::ffff:127.0.0.0-::ffff:127.255.255.255
denied-peer-ip=::ffff:169.254.0.0-::ffff:169.254.255.255
denied-peer-ip=::ffff:172.16.0.0-::ffff:172.31.255.255
denied-peer-ip=::ffff:192.0.0.0-::ffff:192.0.0.255
denied-peer-ip=::ffff:192.88.99.0-::ffff:192.88.99.255
denied-peer-ip=::ffff:192.168.0.0-::ffff:192.168.255.255
denied-peer-ip=::ffff:198.18.0.0-::ffff:198.19.255.255
denied-peer-ip=::ffff:198.51.100.0-::ffff:198.51.100.255
denied-peer-ip=::ffff:203.0.113.0-::ffff:203.0.113.255
denied-peer-ip=::ffff:224.0.0.0-::ffff:239.255.255.255
denied-peer-ip=::ffff:240.0.0.0-::ffff:255.255.255.255
denied-peer-ip=fc00::-fdff:ffff:ffff:ffff:ffff:ffff:ffff:ffff
denied-peer-ip=fe80::-febf:ffff:ffff:ffff:ffff:ffff:ffff:ffff

# Disable CLI and multicast
no-cli
no-multicast-peers

# Security hardening
no-tlsv1
no-tlsv1_1
no-loopback-peers
# Disable STUN on COTURN — we use Google's public STUN server instead (config.py)
no-stun
stale-nonce=600
max-allocations-per-user=5

# Logging
log-file=stdout
# verbose  # Disabled for production — enable for debugging only

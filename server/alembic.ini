# ─────────────────────────────────────────────────────────────────────
# Rapidly — Alembic migration configuration
# Docs: https://alembic.sqlalchemy.org/en/latest/tutorial.html
# ─────────────────────────────────────────────────────────────────────

[alembic]
script_location = migrations

# Migration filenames include a timestamp prefix for chronological ordering.
file_template = %%(year)d-%%(month).2d-%%(day).2d-%%(hour).2d%%(minute).2d_%%(slug)s

prepend_sys_path = .
version_path_separator = os

# Placeholder — overridden at runtime by migrations/env.py.
sqlalchemy.url = driver://user:pass@localhost/dbname

# ── Post-write hooks ─────────────────────────────────────────────────
# Automatically format and lint every newly generated migration file.

[post_write_hooks]
hooks = format,lint

format.type = exec
format.executable = ruff
format.options = format REVISION_SCRIPT_FILENAME

lint.type = exec
lint.executable = ruff
lint.options = check --fix REVISION_SCRIPT_FILENAME

# ── Logging ──────────────────────────────────────────────────────────

[loggers]
keys = root,sqlalchemy,alembic,alembic_utils

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[logger_alembic_utils]
level = INFO
handlers =
qualname = alembic_utils

[handlers]
keys = console

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatters]
keys = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

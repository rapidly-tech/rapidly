packages:
  - apps/*
  - packages/*
  - examples/*

onlyBuiltDependencies:
  - '@parcel/watcher'
  - '@sentry/cli'
  - '@tailwindcss/oxide'
  - core-js-pure
  - esbuild
  - sharp
  - unrs-resolver
  - openapi-typescript

minimumReleaseAge: 1440
# Types-only packages from DefinitelyTyped — no executable supply-chain
# surface; excluded so routine installs don't trip on fresh releases.
minimumReleaseAgeExclude:
  - '@types/*'


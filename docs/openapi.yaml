                            "shares:write"
                        ]
                    }
                ],
                "parameters": [
                    {
                        "name": "workspace_id",
                        "in": "query",
                        "required": true,
                        "schema": {
                            "type": "string",
                            "format": "uuid",
                            "description": "Workspace ID to search within",
                            "title": "Workspace Id"
                        },
                        "description": "Workspace ID to search within"
                    },
                    {
                        "name": "query",
                        "in": "query",
                        "required": true,
                        "schema": {
                            "type": "string",
                            "description": "Search query string",
                            "title": "Query"
                        },
                        "description": "Search query string"
                    },
                    {
                        "name": "limit",
                        "in": "query",
                        "required": false,
                        "schema": {
                            "type": "integer",
                            "maximum": 50,
                            "minimum": 1,
                            "description": "Maximum number of results",

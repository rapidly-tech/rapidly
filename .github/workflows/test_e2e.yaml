name: "E2E Tests"

on:
  pull_request:
    types: [opened, synchronize]
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

defaults:
  run:
    working-directory: ./clients/apps/web

permissions:
  contents: read

jobs:
  changes:
    name: "Detect changes"
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      clients: ${{ steps.filter.outputs.clients }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3
        id: filter
        with:
          filters: |
            clients:
              - 'clients/**'
              - '.github/workflows/test_e2e.yaml'

  e2e:
    name: "E2E Tests 🎭"
    needs: changes
    # ``changes`` only runs on pull_request, so on schedule/workflow_dispatch
    # it is *skipped* — and a skipped ``needs`` job makes this dependent job
    # skip too, regardless of the conditions below. ``!cancelled()`` is a
    # status check that overrides that auto-skip (so the explicit event
    # checks decide) while still bailing out if the run is cancelled.
    if: |
      !cancelled() && (
        github.event_name == 'schedule' ||
        github.event_name == 'workflow_dispatch' ||
        needs.changes.outputs.clients == 'true'
      )
    timeout-minutes: 15
    runs-on: ubuntu-latest
    # Run inside the official Playwright image so the browsers are already
    # baked in (at /ms-playwright). This removes the cdn.playwright.dev
    # download entirely — that fetch reliably reached 100% then hung in
    # extraction on the hosted runners, timing the job out before any test
    # ran. The tag MUST track ``@playwright/test`` in clients/apps/web (the
    # lockfile pins 1.59.1); a mismatch makes Playwright re-download at runtime.
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble

    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
      NEXT_PUBLIC_API_URL: ${{ github.event_name == 'schedule' && vars.E2E_PRODUCTION_API_URL || vars.E2E_API_URL }}
      E2E_CHECKOUT_LINK: ${{ github.event_name == 'schedule' && secrets.E2E_PRODUCTION_CHECKOUT_LINK || secrets.E2E_CHECKOUT_LINK }}

    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          package_json_file: clients/package.json

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: clients/.node-version
          cache: "pnpm"
          cache-dependency-path: "clients/pnpm-lock.yaml"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: ./clients

      # No browser-install step: the Playwright container image already
      # ships the matching browsers at /ms-playwright.

      - name: Run E2E tests
        run: pnpm test:e2e

      - name: Notify Slack on failure
        if: failure() && github.event_name == 'schedule'
        uses: slackapi/slack-github-action@91efab103c0de0a537f72a35f6b8cda0ee76bf0a # v2
        with:
          webhook: ${{ secrets.E2E_SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "🚨 E2E tests failed against production",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "🚨 *E2E tests failed against production*\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>"
                  }
                }
              ]
            }

# Rapidly — Automatically compress documentation images on pull requests to keep the repo lean.

name: Compress docs images

on:
  pull_request:
    paths:
      - "docs/**.png"
      - "docs/**.jpg"
      - "docs/**.jpeg"
      - "docs/**.webp"

jobs:
  compress:
    # Only run on PRs from branches within this repo (skip forks)
    if: github.event.pull_request.head.repo.full_name == github.repository
    name: Optimize documentation images
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Compress changed images
        uses: calibreapp/image-actions@9d037c06280028c110ff61c433ad4dc7d33c3c43 # 1.5.0
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

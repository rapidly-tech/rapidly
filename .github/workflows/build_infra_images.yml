name: Build Infrastructure Images

on:
  push:
    branches: ["main"]
    paths:
      - "infra/**"
      - ".github/workflows/build_infra_images.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  detect:
    name: "Detect Changes 🔍"
    timeout-minutes: 5
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      images: ${{ steps.find.outputs.images }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 2

      - id: find
        name: Find changed infra images
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            images=$(find infra -name Dockerfile -printf '%h\n' | xargs -I{} basename {} | jq -R -s -c 'split("\n") | map(select(length > 0))')
          else
            changed_dirs=$(git diff --name-only HEAD~1 HEAD -- infra/ | cut -d/ -f2 | sort -u)
            images="[]"
            for dir in $changed_dirs; do
              if [ -f "infra/$dir/Dockerfile" ]; then
                images=$(echo "$images" | jq -c ". + [\"$dir\"]")
              fi
            done
          fi
          echo "images=$images" >> "$GITHUB_OUTPUT"

  build:
    name: "Build ${{ matrix.image }} 🐳"
    needs: detect
    if: needs.detect.outputs.images != '[]'
    timeout-minutes: 20
    strategy:
      matrix:
        image: ${{ fromJson(needs.detect.outputs.images) }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ghcr.io/rapidly-tech/rapidly-${{ matrix.image }}
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          context: ./infra/${{ matrix.image }}
          platforms: linux/amd64

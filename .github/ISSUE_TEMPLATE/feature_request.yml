name: Feature request
description: 'Have an idea for Rapidly? We would love to hear it.'
type: 'Discussion'
body:
    - type: textarea
      id: feature_request
      attributes:
          label: What would you like to see?
          value:
              "## Problem or use case\n\n*What are you trying to accomplish?*\n\n## Proposed solution\n\n*How would you like this to work?*\n\n## Alternatives considered\n\n*Have you tried other approaches?*\n\n## Additional context\n\n*Screenshots, links, or anything else that helps.*\n

              "

    - type: markdown
      attributes:
          value: '#### Thanks for sharing your idea — every suggestion helps shape Rapidly!'
